<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="300" height="100">
  <!-- Geometric Grey Rock Shape -->
  <defs>
    <style>
      .rock-shape { fill: #2C3E50; }
      .accent-line { stroke: #E74C3C; stroke-width: 2; fill: none; }
      .logo-text { font-family: 'Arial', sans-serif; font-size: 28px; font-weight: bold; fill: #2C3E50; }
    </style>
  </defs>

  <!-- Rock icon (abstract geometric shape) -->
  <polygon class="rock-shape" points="30,20 45,15 50,35 40,50 20,45 15,30"/>
  <polygon class="rock-shape" points="25,45 40,40 55,50 50,65 30,60"/>

  <!-- Accent line accent-line -->
  <path class="accent-line" d="M 15 30 Q 30 25 50 35"/>

  <!-- Logo Text -->
  <text class="logo-text" x="70" y="50">GreyStoke</text>

  <!-- Small tagline -->
  <text x="70" y="68" style="font-family: Arial; font-size: 11px; fill: #95A5A6;">Self-Catering Stays</text>
</svg>
